<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Velocidade de Jogo</title>

    <style>                   
        /* usa p centralizar os botoes */
        .botoes, .velocidade {      
            text-align: center;
        }
    </style>

</head>
<body>
    
    <h1 align="center">Sistema de Velocidade de Jogo</h1>

    <!-- interlica os botao p fica no meio -->
    <div class="botoes">
        <button onclick="acelerar()">Acelerar</button>
        <button onclick="desacelerar()">Desacelerar</button>
    </div>

    <!-- p aparecer a velocidade -->
    <div class="velocidade" id="VelocidadeAtual">
    </div>

    <!-- conecta com o codiguinho -->
    <script src="script2.js"></script>
    
</body>
</html>
